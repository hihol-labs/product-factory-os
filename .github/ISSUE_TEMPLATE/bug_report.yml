name: Bug report
description: Report a runtime, validator, starter, or methodology defect.
title: "[Bug]: "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include the PFO command, project type, or fixture that reproduces the issue.
      placeholder: |
        1. Run `python3 scripts/pfo.py ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Codex environment, PFO version.
