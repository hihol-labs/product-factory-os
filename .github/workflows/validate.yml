name: Validate Methodology

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      live_headless:
        description: "Run live command-mode headless fixtures"
        required: false
        default: "false"
      live_fixtures:
        description: "Space-separated fixture names"
        required: false
        default: "deploy-production migration infra-generate github-workflow tool-sync security-audit session-save"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate structure
        run: python3 scripts/validate_structure.py

      - name: Validate Engineering Discipline v2 wiring
        run: python3 scripts/validate_plan_quality.py --self-check

      - name: Validate control harness
        run: python3 scripts/validate_control_harness.py

      - name: Validate defensive layers
        run: python3 scripts/validate_defensive_layers.py

      - name: Validate self contracts
        run: python3 scripts/validate_self_contracts.py

      - name: Run routing fixtures
        run: python3 scripts/run_fixtures.py

      - name: Verify trigger registry
        run: python3 scripts/verify_triggers.py

      - name: Verify behavioural fixture contracts
        run: python3 scripts/verify_fixture_contracts.py

      - name: Run headless behavioural fixture validator
        run: python3 scripts/run_headless_fixtures.py --mode mock

      - name: Validate eval layer
        run: python3 scripts/validate_eval_layer.py

      - name: Verify skill risk profiles
        run: python3 scripts/verify_skill_profiles.py

      - name: Validate execution graph semantics
        run: python3 scripts/validate_execution_graph.py

      - name: Validate runtime assets
        run: python3 scripts/validate_runtime.py

      - name: Validate context runtime
        run: python3 scripts/validate_context_runtime.py

      - name: Validate tool capability registry
        run: python3 scripts/validate_tool_registry.py docs/templates/pfo/TOOL_CAPABILITY_REGISTRY.json integrations/tool-capability-registry.json

      - name: Validate security report contract
        run: python3 scripts/validate_security_report.py --self-check

      - name: Validate hook contracts
        run: python3 scripts/validate_hooks.py

      - name: Verify manifest drift
        run: python3 scripts/verify_manifest_drift.py

      - name: Verify install and hook sync
        run: python3 scripts/verify_install_sync.py

      - name: Run benchmark suite
        run: python3 scripts/run_benchmarks.py

      - name: Smoke-test PFO project bootstrap
        run: python3 scripts/pfo_new_project.py smoke-pfo-product --workspace /tmp --idea "Smoke SaaS product"

      - name: Smoke-test PFO plan generation
        run: python3 scripts/pfo.py plan /tmp/smoke-pfo-product --note "CI smoke"

      - name: Validate bootstrapped PFO state
        run: python3 scripts/validate_state.py /tmp/smoke-pfo-product/.codex-memory/STATE.json

      - name: Validate bootstrapped PFO project
        run: python3 scripts/validate_project.py /tmp/smoke-pfo-product

      - name: Analyze existing project smoke
        run: python3 scripts/pfo.py analyze /tmp/smoke-pfo-product --report

      - name: Generate bootstrapped PFO report
        run: python3 scripts/pfo_report.py /tmp/smoke-pfo-product

      - name: Run meta review
        run: python3 scripts/meta_review.py

      - name: Production readiness gate
        run: python3 scripts/production_readiness.py

      - name: Live headless fixture proof
        if: github.event_name == 'workflow_dispatch' && inputs.live_headless == 'true'
        env:
          PFO_HEADLESS_COMMAND: ${{ secrets.PFO_HEADLESS_COMMAND }}
          LIVE_FIXTURES: ${{ inputs.live_fixtures }}
        run: |
          test -n "$PFO_HEADLESS_COMMAND" || { echo "Missing secret PFO_HEADLESS_COMMAND"; exit 1; }
          args=""
          for fixture in $LIVE_FIXTURES; do
            args="$args --fixture $fixture"
          done
          python3 scripts/validate_release_live_headless.py $args \
            --output-root .pfo-headless-runs/live \
            --command-template "$PFO_HEADLESS_COMMAND"
