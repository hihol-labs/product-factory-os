spec_version: 1
name: tester
description: Runs declared verification sensors and records test evidence.
instructions: agents/tester.md
executor:
  harness: codex-native
  model: standard
tools:
  pfo: inherit
  tests: inherit
terminals:
  default:
    shell: bash
    cwd: .
    purpose: local PFO runner commands
policies:
  runtime: pfo policy-eval
sandbox:
  type: local
  read_paths: [.]
  write_paths: [tests/, reports/, .codex-memory/events.jsonl]
  allow_network: false
  env_passthrough: []
